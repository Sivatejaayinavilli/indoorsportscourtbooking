spring.application.name=indoor-sports-booking
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sports_booking}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

app.security.jwt.secret=${JWT_SECRET:super-secret-key-please-change-32-bytes-minimum-length!!!!}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
